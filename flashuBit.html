<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="icon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flashuBit - Micro:bit Transfer Tool</title>
    
    <script src="https://unpkg.com/dapjs@0.3.1/dist/dapjs.bundle.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: url('bg.WEBP') no-repeat center center fixed;
            background-size: cover;
            margin: 0; padding: 20px; text-align: center;
        }
        .container {
            max-width: 900px; margin: 0 auto; background: white;
            border-radius: 10px; padding: 30px; box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.2);
            position: relative; min-height: 480px;
        }
        .title { font-size: 44px; font-weight: bold; color: #6f42c1; margin-bottom: 10px; }
        .home-button img { width: 50px; height: 50px; cursor: pointer; position: absolute; top: 10px; left: 10px; }
        
        .btn {
            padding: 15px 30px; font-size: 22px; margin: 10px;
            cursor: pointer; border: none; border-radius: 8px;
            color: white; font-weight: bold; transition: 0.2s;
        }
        #uploadBtn { background: #6c757d; }
        #connectBtn { background: #007bff; }
        #flashBtn { background: #32CD32; display: none; }
        
        #status { 
            margin-top: 30px; font-size: 24px; font-weight: bold; 
            padding: 20px; border: 3px dashed #6f42c1;
            border-radius: 8px; background: #f9f0ff; color: #444;
        }
        .success { background: #d4edda !important; border-color: #28a745 !important; color: #155724 !important; }
        .error { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24 !important; }
        
        progress { width: 90%; height: 25px; margin-top: 20px; display: none; }
        .credit { font-size: 18px; font-style: italic; color: gray; position: absolute; bottom: 10px; right: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="home-button">
            <a href="index.html"><img src="home.png" alt="Home"></a>
        </div>

        <div class="title">flashuBit</div>

        <p>Since BitLocker is active, use this tool to send code directly to the hardware.</p>

        <input type="file" id="fileInput" accept=".hex" style="display:none;">

        <div class="button-group">
            <button class="btn" id="uploadBtn" onclick="document.getElementById('fileInput').click()">1. Select .hex File</button>
            <button class="btn" id="connectBtn">2. Pair Micro:bit</button>
            <br>
            <button class="btn" id="flashBtn">⚡ 3. Send to Micro:bit</button>
        </div>

        <div id="status">Please select your project file...</div>
        <progress id="progressBar" value="0" max="100"></progress>

        <div class="credit">Mr Stanton-Cole</div>
    </div>

    <script>
        var device, fileBuffer;
        var fileInput = document.getElementById('fileInput');
        var statusBox = document.getElementById('status');
        var connectBtn = document.getElementById('connectBtn');
        var flashBtn = document.getElementById('flashBtn');
        var progressBar = document.getElementById('progressBar');

        // Check if library is present
        window.onload = function() {
            if (typeof dapjs === 'undefined') {
                statusBox.innerText = "Error: System Library missing. Check Internet.";
                statusBox.className = "error";
            }
        };

        fileInput.onchange = function(e) {
            var file = e.target.files[0];
            if (file) {
                var reader = new FileReader();
                reader.onload = function(event) {
                    fileBuffer = event.target.result;
                    statusBox.innerHTML = "✅ <b>File Ready:</b> " + file.name;
                    statusBox.className = "success";
                };
                reader.readAsArrayBuffer(file);
            }
        };

        connectBtn.onclick = async function() {
            try {
                statusBox.innerText = "Requesting USB Access...";
                // Specifically look for the micro:bit hardware IDs
                device = await navigator.usb.requestDevice({
                    filters: [{ vendorId: 0x0d28, productId: 0x0204 }]
                });

                statusBox.innerHTML = "🔗 <b>Hardware Linked:</b> " + device.productName;
                statusBox.className = "success";
                connectBtn.style.display = "none";
                flashBtn.style.display = "inline-block";
            } catch (err) {
                statusBox.innerText = "Connection Denied. Ensure no other tabs are using the Micro:bit.";
                statusBox.className = "error";
            }
        };

        flashBtn.onclick = async function() {
            if (!fileBuffer || !device) return;

            // Reset UI for flashing
            flashBtn.disabled = true;
            statusBox.innerText = "Initializing Transfer...";
            progressBar.style.display = "inline-block";
            progressBar.value = 0;

            try {
                var transport = new dapjs.WebUSB(device);
                var target = new dapjs.DAPLink(transport);

                target.on(dapjs.DAPLink.EVENT_PROGRESS, function(p) {
                    progressBar.value = p * 100;
                    statusBox.innerText = "Flashing Hardware: " + Math.round(p * 100) + "%";
                });

                await target.connect();
                await target.flash(fileBuffer);
                await target.disconnect();

                statusBox.innerHTML = "Success! Your code is running. 🎉";
                statusBox.className = "success";
                progressBar.style.display = "none";
            } catch (err) {
                statusBox.innerHTML = "<b>Flash Failed:</b> " + err.message + "<br><small>Unplug and replug the Micro:bit and try again.</small>";
                statusBox.className = "error";
            } finally {
                flashBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
