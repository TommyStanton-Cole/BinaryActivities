<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="icon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flashuBit - Micro:bit Transfer Tool</title>
    
    <script src="https://app.enzuzo.com/scripts/cookiebar/fd6b23e2-8668-11f0-9530-379c1d5a0f18"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4187017556041967" crossorigin="anonymous"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: url('bg.WEBP') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            padding: 20px;
            text-align: center;
            color: black;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            position: relative;
            min-height: 480px;
        }
        .title { font-size: 44px; font-weight: bold; margin-bottom: 10px; color: #6f42c1; }
        .home-button img { width: 50px; height: 50px; cursor: pointer; position: absolute; top: 10px; left: 10px; }
        .instruction-text { font-size: 20px; margin-bottom: 30px; line-height: 1.5; color: #333; }
        
        button {
            padding: 15px 30px;
            font-size: 22px;
            margin: 10px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            transition: all 0.2s;
        }
        #uploadBtn { background: #6c757d; }
        #connectBtn { background: #007bff; }
        #flashBtn { background: #32CD32; display: none; box-shadow: 0px 4px 0px #248a24; }
        
        /* Confirmation Styling */
        #status { margin-top: 30px; font-size: 24px; font-weight: bold; color: #444; border: 2px solid transparent; padding: 10px; border-radius: 8px; }
        .file-ready { border-color: #007bff !important; background: #e7f3ff; color: #007bff !important; }
        
        progress { width: 90%; height: 25px; margin-top: 20px; display: none; accent-color: #32CD32; }
        .credit { font-size: 18px; font-style: italic; margin-top: 15px; text-align: right; color: gray; position: absolute; bottom: 10px; right: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="home-button">
            <a href="index.html"><img src="home.png" alt="Home"></a>
        </div>

        <div class="title">flashuBit</div>

        <div class="instruction-text">
            1. Pick your <b>.hex</b> file.<br>
            2. Connect your Micro:bit via USB.<br> 
            3. Flash the code!
        </div>

        <input type="file" id="fileInput" accept=".hex" style="display:none;">

        <div class="button-group">
            <button id="uploadBtn" onclick="document.getElementById('fileInput').click()">1. Pick a Hex File</button>
            <button id="connectBtn">2. Pair Micro:bit</button>
            <br>
            <button id="flashBtn">⚡ 3. Send to Micro:bit</button>
        </div>

        <div id="status">Waiting for file...</div>
        <progress id="progressBar" value="0" max="100"></progress>

        <div class="credit">Mr Stanton-Cole</div>
    </div>

    <script type="module">
        import * as dapjs from 'https://cdn.jsdelivr.net/npm/dapjs@0.3.2/+esm';

        const fileInput = document.getElementById('fileInput');
        const connectBtn = document.getElementById('connectBtn');
        const flashBtn = document.getElementById('flashBtn');
        const status = document.getElementById('status');
        const progressBar = document.getElementById('progressBar');

        let device;
        let fileBuffer;

        // VISUAL CONFIRMATION: When file is picked
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    fileBuffer = event.target.result;
                    status.innerText = `✔️ Ready: ${file.name}`;
                    status.classList.add('file-ready'); // Turns the box blue
                };
                reader.readAsArrayBuffer(file);
            }
        });

        // STEP 2: Connect to hardware
        connectBtn.addEventListener('click', async () => {
            try {
                status.innerText = "Searching for device...";
                device = await navigator.usb.requestDevice({
                    filters: [{ vendorId: 0x0d28, productId: 0x0204 }]
                });

                status.innerText = `🔗 Connected to ${device.productName}`;
                status.style.color = "#32CD32";
                connectBtn.style.display = "none";
                flashBtn.style.display = "inline-block";
            } catch (err) {
                status.innerText = "❌ Connection failed. Ensure Micro:bit is plugged in.";
                console.error(err);
            }
        });

        // STEP 3: Flash to Micro:bit
        flashBtn.addEventListener('click', async () => {
            if (!fileBuffer || !device) {
                status.innerText = "Error: File or Device missing.";
                return;
            }

            // Create the transfer protocol
            const transport = new dapjs.WebUSB(device);
            const target = new dapjs.DAPLink(transport);

            // Progress Bar Logic
            target.on(dapjs.DAPLink.EVENT_PROGRESS, (progress) => {
                progressBar.style.display = "inline-block";
                progressBar.value = progress * 100;
                status.innerText = `Flashing... ${Math.round(progress * 100)}%`;
            });

            try {
                flashBtn.disabled = true;
                await target.connect();
                await target.flash(fileBuffer);
                await target.disconnect();

                status.innerText = "Flash Successful! 🎉";
                status.classList.remove('file-ready');
                progressBar.style.display = "none";
            } catch (err) {
                status.innerText = "❌ Flash Error: " + err.message;
                console.error(err);
            } finally {
                flashBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
